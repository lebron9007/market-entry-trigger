<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Entry Trigger</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="title-row">
        <h1>Market Entry Trigger</h1>
        <div class="updated" id="last-updated">Loading…</div>
      </div>
      <p class="subtitle">Five conditions that historically precede high-probability market entries.</p>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="vix">VIX</button>
      <button class="tab" data-tab="fed">Fed Fund Rates</button>
      <button class="tab" data-tab="margin">Debt Margin</button>
      <button class="tab" data-tab="sectors">Leading Sectors</button>
      <button class="tab" data-tab="earnings">Earnings</button>
    </nav>

    <!-- OVERVIEW -->
    <section class="panel active" id="panel-overview">
      <div class="score-panel">
        <div class="score-big">
          <div class="score-number" id="score-number">–</div>
          <div class="score-label">of 5 triggers met</div>
        </div>
        <div class="score-meta">
          <div class="confidence-row">
            <span class="confidence-label">Confidence</span>
            <span class="confidence-value" id="confidence-value">–</span>
          </div>
          <div class="confidence-bar"><div class="confidence-fill" id="confidence-fill"></div></div>
          <div class="verdict" id="verdict">Awaiting data…</div>
        </div>
      </div>

      <div class="cards" id="cards">
        <div class="card skeleton"><div class="sk sk-title"></div><div class="sk sk-value"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-narrow"></div></div>
        <div class="card skeleton"><div class="sk sk-title"></div><div class="sk sk-value"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-narrow"></div></div>
        <div class="card skeleton"><div class="sk sk-title"></div><div class="sk sk-value"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-narrow"></div></div>
        <div class="card skeleton"><div class="sk sk-title"></div><div class="sk sk-value"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-narrow"></div></div>
        <div class="card skeleton"><div class="sk sk-title"></div><div class="sk sk-value"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-narrow"></div></div>
      </div>

      <div class="history">
        <div class="history-header">
          <h2>Historical Alignment</h2>
          <div class="legend">
            <span class="legend-item"><span class="dot dot-5"></span>5/5</span>
            <span class="legend-item"><span class="dot dot-4"></span>4/5</span>
            <span class="legend-item"><span class="dot dot-3"></span>3/5</span>
            <span class="legend-item"><span class="dot dot-low"></span>≤2/5</span>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="history-chart"></canvas></div>
        <p class="history-note" id="history-note"></p>
      </div>
    </section>

    <!-- VIX detail -->
    <section class="panel" id="panel-vix"><div id="vix-detail" class="detail"></div></section>
    <!-- Fed detail -->
    <section class="panel" id="panel-fed"><div id="fed-detail" class="detail"></div></section>
    <!-- Margin detail -->
    <section class="panel" id="panel-margin"><div id="margin-detail" class="detail"></div></section>
    <!-- Sectors detail -->
    <section class="panel" id="panel-sectors"><div id="sectors-detail" class="detail"></div></section>
    <!-- Earnings detail -->
    <section class="panel" id="panel-earnings"><div id="earnings-detail" class="detail"></div></section>

    <footer class="footer">
      <span>Data sources: Stooq · FRED · FINRA · Finnhub · Fed dot plot</span>
      <span id="data-mode">mock data</span>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
